<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniSync 控制台</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: #fffdf8;
        --text: #1f2a35;
        --muted: #5f6b76;
        --line: #d9d1c4;
        --accent: #c0582f;
        --accent-strong: #8e3f21;
        --ok: #1f8a59;
        --error: #b23434;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #f8d6b3 0%, transparent 35%),
          radial-gradient(circle at 90% 20%, #d7ead8 0%, transparent 40%),
          var(--bg);
        min-height: 100vh;
      }

      .wrap {
        max-width: 980px;
        margin: 28px auto;
        padding: 0 16px 24px;
      }

      .hero {
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 0.5px;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(35, 30, 20, 0.08);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .full {
        grid-column: 1 / -1;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 11px;
        background: #fff;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .toggle input {
        width: auto;
        margin: 0;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 9px 14px;
        cursor: pointer;
        color: #fff;
        background: var(--accent);
        transition: background 0.2s ease;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .subtle {
        background: #607284;
      }

      .subtle:hover {
        background: #465565;
      }

      .output {
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px;
        min-height: 90px;
        background: #fff;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .file-list {
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        padding: 10px;
        min-height: 70px;
      }

      .file-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 7px 0;
        border-bottom: 1px dashed #e5ddcf;
      }

      .file-row:last-child {
        border-bottom: 0;
      }

      .file-meta {
        font-size: 13px;
        color: var(--muted);
      }

      .file-download-btn {
        border: 0;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        color: #fff;
        background: #607284;
      }

      .file-download-btn:hover {
        background: #465565;
      }

      .file-delete-btn {
        border: 0;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        color: #fff;
        background: #b23434;
      }

      .file-delete-btn:hover {
        background: #902626;
      }

      .file-actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .file-check {
        width: auto;
      }

      .ok {
        color: var(--ok);
      }

      .error {
        color: var(--error);
      }

      @media (max-width: 760px) {
        .fields {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1>OmniSync 数据控制台</h1>
        <div class="subtitle">用于设置数据（POST）和获取数据（GET）</div>
      </div>

      <div class="grid">
        <section class="card">
          <h2>认证与基础配置</h2>
          <div class="fields">
            <div class="full">
              <label for="token">Bearer Token</label>
              <input id="token" type="password" placeholder="例如: test 或你的 APP_TOKEN" />
            </div>
            <div>
              <label for="baseUrl">API Base URL</label>
              <input id="baseUrl" type="text" value="" placeholder="默认同源，例如 http://127.0.0.1:8000" />
            </div>
          </div>
        </section>

        <section class="card">
          <h2>设置数据</h2>
          <div class="fields">
            <div>
              <label for="setKey">Key</label>
              <input id="setKey" type="text" placeholder="例如: clipboard" />
            </div>
            <div>
              <label for="expectedVersion">Expected Version (可选)</label>
              <input id="expectedVersion" type="number" min="1" placeholder="例如: 1" />
            </div>
            <div class="full">
              <label for="setValue">Value</label>
              <textarea id="setValue" placeholder="输入文本内容"></textarea>
            </div>
          </div>
          <div class="actions">
            <button id="setBtn">提交设置</button>
          </div>
          <div id="setOut" class="output"></div>
        </section>

        <section class="card">
          <h2>获取数据</h2>
          <div class="fields">
            <div>
              <label for="getKey">Key</label>
              <input id="getKey" type="text" placeholder="例如: clipboard" />
            </div>
            <div>
              <label for="valueOnly">显示选项</label>
              <label class="toggle">
                <input id="valueOnly" type="checkbox" />
                <span>只获取 value</span>
              </label>
            </div>
          </div>
          <div class="actions">
            <button id="getBtn">按 Key 获取</button>
            <button id="listBtn" class="subtle">获取列表</button>
          </div>
          <div id="getOut" class="output"></div>
        </section>

        <section class="card">
          <h2>文件上传与下载</h2>
          <div class="fields">
            <div>
              <label for="fileKey">文件 Key</label>
              <input id="fileKey" type="text" placeholder="可选，不填则自动生成" />
            </div>
            <div>
              <label for="fileExpectedVersion">Expected Version (可选)</label>
              <input id="fileExpectedVersion" type="number" min="1" placeholder="例如: 1" />
            </div>
            <div class="full">
              <label for="uploadFile">选择文件</label>
              <input id="uploadFile" type="file" />
            </div>
          </div>
          <div class="actions">
            <button id="uploadBtn">上传文件</button>
            <button id="downloadBtn" class="subtle">下载文件</button>
            <button id="deleteBtn" class="subtle">删除单个</button>
            <button id="listFilesBtn" class="subtle">获取可下载文件列表</button>
            <button id="deleteSelectedBtn" class="subtle">删除勾选项</button>
          </div>
          <div class="fields">
            <div class="full">
              <label for="batchDeleteKeys">批量删除 Key（可选，逗号/空格/换行分隔）</label>
              <textarea id="batchDeleteKeys" placeholder="例如:\navatar\nreport-2026\nbackup-file"></textarea>
            </div>
          </div>
          <div class="actions">
            <button id="batchDeleteBtn" class="subtle">批量删除输入 Key</button>
          </div>
          <div id="fileOut" class="output"></div>
          <div id="fileListOut" class="file-list">暂无数据</div>
        </section>
      </div>
    </div>

    <script>
      function apiBase() {
        const v = document.getElementById("baseUrl").value.trim();
        return v || window.location.href.replace(/\/+$/, "");
      }

      function tokenHeader() {
        const token = document.getElementById("token").value.trim();
        return token ? { Authorization: "Bearer " + token } : {};
      }

      async function parseBody(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return await response.json();
        }
        return await response.text();
      }

      async function toText(response) {
        const data = await parseBody(response);
        return typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      function setOut(elId, ok, text) {
        const el = document.getElementById(elId);
        el.textContent = text;
        el.className = "output " + (ok ? "ok" : "error");
      }

      async function downloadFileByKey(key) {
        const url = apiBase() + "/v1/files/" + encodeURIComponent(key);
        const resp = await fetch(url, {
          method: "GET",
          headers: {
            ...tokenHeader(),
          },
        });

        if (!resp.ok) {
          const bodyText = await toText(resp);
          throw new Error("HTTP " + resp.status + "\n" + bodyText);
        }

        const blob = await resp.blob();
        const disposition = resp.headers.get("content-disposition") || "";
        const match = disposition.match(/filename\*=UTF-8''([^;]+)|filename=\"?([^\";]+)\"?/i);
        const encodedName = match ? match[1] || match[2] : "";
        const fileName = encodedName ? decodeURIComponent(encodedName) : key;

        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objectUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(objectUrl);

        return { fileName, size: blob.size };
      }

      async function deleteFileByKey(key, expectedVersionRaw) {
        const url = new URL(apiBase() + "/v1/files/" + encodeURIComponent(key));
        if (expectedVersionRaw) {
          url.searchParams.set("expected_version", expectedVersionRaw);
        }

        const resp = await fetch(url.toString(), {
          method: "DELETE",
          headers: {
            ...tokenHeader(),
          },
        });

        const body = await parseBody(resp);
        const bodyText = typeof body === "string" ? body : JSON.stringify(body, null, 2);
        if (!resp.ok) {
          throw new Error("key=" + key + " | HTTP " + resp.status + "\n" + bodyText);
        }
        return bodyText;
      }

      function splitKeys(raw) {
        return (raw || "")
          .split(/[\s,]+/)
          .map((s) => s.trim())
          .filter(Boolean);
      }

      async function deleteKeysBatch(keys, expectedVersionRaw) {
        const uniqueKeys = Array.from(new Set(keys));
        const results = [];
        for (const key of uniqueKeys) {
          try {
            await deleteFileByKey(key, expectedVersionRaw);
            results.push("OK  " + key);
          } catch (err) {
            results.push("ERR " + (err && err.message ? err.message : String(err)));
          }
        }
        return { total: uniqueKeys.length, lines: results };
      }

      function renderFileList(files) {
        const out = document.getElementById("fileListOut");
        out.innerHTML = "";

        if (!files.length) {
          out.textContent = "没有可下载文件";
          return;
        }

        for (const file of files) {
          const row = document.createElement("div");
          row.className = "file-row";

          const left = document.createElement("div");
          const keyLine = document.createElement("div");
          keyLine.textContent = file.key + "  (" + file.original_name + ")";
          const meta = document.createElement("div");
          meta.className = "file-meta";
          meta.textContent = file.size_bytes + " bytes | v" + file.version + " | " + file.updated_at;
          left.appendChild(keyLine);
          left.appendChild(meta);

          const actions = document.createElement("div");
          actions.className = "file-actions";

          const check = document.createElement("input");
          check.type = "checkbox";
          check.className = "file-check";
          check.dataset.fileKey = file.key;

          const downloadBtn = document.createElement("button");
          downloadBtn.className = "file-download-btn";
          downloadBtn.textContent = "下载";
          downloadBtn.addEventListener("click", async () => {
            try {
              const result = await downloadFileByKey(file.key);
              setOut("fileOut", true, "下载成功: " + result.fileName + " (" + result.size + " bytes)");
            } catch (err) {
              setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
            }
          });

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "file-delete-btn";
          deleteBtn.textContent = "删除";
          deleteBtn.addEventListener("click", async () => {
            if (!window.confirm("确认硬删除文件 key=" + file.key + " ?\n删除后不可恢复。")) {
              return;
            }
            try {
              await deleteFileByKey(file.key, document.getElementById("fileExpectedVersion").value.trim());
              setOut("fileOut", true, "删除成功: " + file.key);
              row.remove();
              if (!out.children.length) {
                out.textContent = "没有可下载文件";
              }
            } catch (err) {
              setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
            }
          });

          row.appendChild(left);
          actions.appendChild(check);
          actions.appendChild(downloadBtn);
          actions.appendChild(deleteBtn);
          row.appendChild(actions);
          out.appendChild(row);
        }
      }

      function makeAutoFileKey(fileName) {
        const baseName = (fileName || "file")
          .toLowerCase()
          .replace(/[^a-z0-9._-]+/g, "-")
          .replace(/^-+|-+$/g, "") || "file";
        return "auto-" + baseName + "-" + Date.now();
      }

      document.getElementById("setBtn").addEventListener("click", async () => {
        const key = document.getElementById("setKey").value.trim();
        const value = document.getElementById("setValue").value;
        const expectedVersionRaw = document.getElementById("expectedVersion").value.trim();

        if (!key) {
          setOut("setOut", false, "请先填写 Key");
          return;
        }

        const payload = { value };
        if (expectedVersionRaw) {
          payload.expected_version = Number(expectedVersionRaw);
        }

        const url = apiBase() + "/v1/items/" + encodeURIComponent(key);
        try {
          const resp = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...tokenHeader(),
            },
            body: JSON.stringify(payload),
          });
          const bodyText = await toText(resp);
          setOut("setOut", resp.ok, "HTTP " + resp.status + "\n" + bodyText);
        } catch (err) {
          setOut("setOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("getBtn").addEventListener("click", async () => {
        const key = document.getElementById("getKey").value.trim();
        const valueOnly = document.getElementById("valueOnly").checked;
        if (!key) {
          setOut("getOut", false, "请先填写 Key");
          return;
        }

        const url = apiBase() + "/v1/items/" + encodeURIComponent(key);
        try {
          const resp = await fetch(url, {
            method: "GET",
            headers: {
              ...tokenHeader(),
            },
          });
          const body = await parseBody(resp);
          let bodyText;
          if (resp.ok && valueOnly && body && typeof body === "object" && "value" in body) {
            bodyText = String(body.value ?? "");
          } else {
            bodyText = typeof body === "string" ? body : JSON.stringify(body, null, 2);
          }
          setOut("getOut", resp.ok, "HTTP " + resp.status + "\n" + bodyText);
        } catch (err) {
          setOut("getOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("listBtn").addEventListener("click", async () => {
        const url = apiBase() + "/v1/items";
        try {
          const resp = await fetch(url, {
            method: "GET",
            headers: {
              ...tokenHeader(),
            },
          });
          const bodyText = await toText(resp);
          setOut("getOut", resp.ok, "HTTP " + resp.status + "\n" + bodyText);
        } catch (err) {
          setOut("getOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("uploadBtn").addEventListener("click", async () => {
        const keyInput = document.getElementById("fileKey");
        let key = keyInput.value.trim();
        const expectedVersionRaw = document.getElementById("fileExpectedVersion").value.trim();
        const fileInput = document.getElementById("uploadFile");
        const selectedFile = fileInput.files && fileInput.files[0];

        if (!selectedFile) {
          setOut("fileOut", false, "请先选择要上传的文件");
          return;
        }

        if (!key) {
          key = makeAutoFileKey(selectedFile.name);
          keyInput.value = key;
        }

        const url = new URL(apiBase() + "/v1/files/" + encodeURIComponent(key));
        if (expectedVersionRaw) {
          url.searchParams.set("expected_version", expectedVersionRaw);
        }

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
          const resp = await fetch(url.toString(), {
            method: "PUT",
            headers: {
              ...tokenHeader(),
            },
            body: formData,
          });
          const bodyText = await toText(resp);
          const keyNote = "\nkey: " + key;
          setOut("fileOut", resp.ok, "HTTP " + resp.status + keyNote + "\n" + bodyText);
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("downloadBtn").addEventListener("click", async () => {
        const key = document.getElementById("fileKey").value.trim();
        if (!key) {
          setOut("fileOut", false, "请先填写文件 Key");
          return;
        }
        try {
          const result = await downloadFileByKey(key);
          setOut("fileOut", true, "下载成功: " + result.fileName + " (" + result.size + " bytes)");
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("deleteBtn").addEventListener("click", async () => {
        const key = document.getElementById("fileKey").value.trim();
        const expectedVersionRaw = document.getElementById("fileExpectedVersion").value.trim();
        if (!key) {
          setOut("fileOut", false, "请先填写文件 Key");
          return;
        }
        if (!window.confirm("确认硬删除文件 key=" + key + " ?\n删除后不可恢复。")) {
          return;
        }
        try {
          await deleteFileByKey(key, expectedVersionRaw);
          setOut("fileOut", true, "删除成功: " + key);
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("listFilesBtn").addEventListener("click", async () => {
        const url = apiBase() + "/v1/files?limit=500";
        try {
          const resp = await fetch(url, {
            method: "GET",
            headers: {
              ...tokenHeader(),
            },
          });
          const body = await parseBody(resp);
          if (!resp.ok) {
            const bodyText = typeof body === "string" ? body : JSON.stringify(body, null, 2);
            setOut("fileOut", false, "HTTP " + resp.status + "\n" + bodyText);
            return;
          }

          const allFiles = body && Array.isArray(body.files) ? body.files : [];
          const downloadableFiles = allFiles.filter((f) => !f.is_deleted);
          renderFileList(downloadableFiles);
          setOut("fileOut", true, "已加载可下载文件: " + downloadableFiles.length + " 个");
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("deleteSelectedBtn").addEventListener("click", async () => {
        const expectedVersionRaw = document.getElementById("fileExpectedVersion").value.trim();
        const checked = Array.from(document.querySelectorAll("#fileListOut .file-check:checked"));
        const keys = checked.map((node) => node.dataset.fileKey).filter(Boolean);

        if (!keys.length) {
          setOut("fileOut", false, "请先在文件列表中勾选要删除的文件");
          return;
        }
        if (!window.confirm("确认硬删除已勾选的 " + keys.length + " 个文件?\n删除后不可恢复。")) {
          return;
        }

        try {
          const result = await deleteKeysBatch(keys, expectedVersionRaw);
          setOut("fileOut", true, "批量删除完成: " + result.total + " 个\n" + result.lines.join("\n"));
          document.getElementById("listFilesBtn").click();
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });

      document.getElementById("batchDeleteBtn").addEventListener("click", async () => {
        const expectedVersionRaw = document.getElementById("fileExpectedVersion").value.trim();
        const raw = document.getElementById("batchDeleteKeys").value;
        const keys = splitKeys(raw);
        if (!keys.length) {
          setOut("fileOut", false, "请先输入要删除的文件 Key");
          return;
        }
        if (!window.confirm("确认硬删除输入的 " + keys.length + " 个文件?\n删除后不可恢复。")) {
          return;
        }

        try {
          const result = await deleteKeysBatch(keys, expectedVersionRaw);
          setOut("fileOut", true, "批量删除完成: " + result.total + " 个\n" + result.lines.join("\n"));
          document.getElementById("listFilesBtn").click();
        } catch (err) {
          setOut("fileOut", false, "请求失败: " + (err && err.message ? err.message : String(err)));
        }
      });
    </script>
  </body>
</html>
